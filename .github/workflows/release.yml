name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build runtime
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Package release
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME.TrimStart("v") } else { "manual-$env:GITHUB_RUN_NUMBER" }
          .\scripts\release.ps1 -Version $version
          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          if (-not (Test-Path ".build/package/meccha-camouflage-$version.zip")) { throw "package zip missing" }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: meccha-camouflage-${{ env.PACKAGE_VERSION }}
          path: .build/package/meccha-camouflage-${{ env.PACKAGE_VERSION }}.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: .build/package/meccha-camouflage-${{ env.PACKAGE_VERSION }}.zip
